<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      .bg-circle { fill: #f3d1a7; }
      .outline { stroke: #3d3b57; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .fill-blue-dark { fill: #8faed9; }
      .fill-pink { fill: #f59698; }
      .fill-blue-light { fill: #d3e5f2; }
      .fill-white { fill: #ffffff; }
      .chip-body { fill: #a5c3e8; }
      .chip-inner { fill: #72a4e0; }
    </style>
  </defs>

  <!-- Circle Background -->
  <circle class="bg-circle" cx="256" cy="256" r="240" />

  <g transform="translate(15, 20)">
    <!-- Head 3 (Back Head) -->
    <path class="fill-blue-dark outline" d="M 120,320 C 120,200, 190,140, 240,140 C 290,140, 310,180, 310,230 C 310,235, 305,245, 300,250 C 295,255, 290,265, 290,275 L 290,320 Z" transform="translate(-60, 0)" />

    <!-- Head 2 (Middle Head) -->
    <path class="fill-pink outline" d="M 120,320 C 120,200, 190,140, 240,140 C 290,140, 310,180, 310,230 C 310,235, 305,245, 300,250 C 295,255, 290,265, 290,275 L 290,320 Z" transform="translate(-20, 0)" />

    <!-- Head 1 (Foreground Head) -->
    <g transform="translate(20, 0)">
      <!-- Main Profile Shape -->
      <path class="fill-blue-light outline" d="M 170,390 L 170,360 L 195,360 C 205,360, 210,350, 210,340 C 210,330, 200,320, 190,320 L 150,320 C 135,320, 130,300, 130,285 C 130,250, 160,210, 165,190 C 170,170, 175,140, 220,110 C 265,80, 335,80, 370,110 C 405,140, 415,190, 415,250 C 415,310, 385,360, 370,390 Z" />

      <!-- Chip on Forehead -->
      <g transform="translate(245, 125)">
        <!-- Chip Pins -->
        <!-- Top and Bottom Pins -->
        <line class="outline" x1="30" y1="-12" x2="30" y2="0" />
        <line class="outline" x1="55" y1="-12" x2="55" y2="0" />
        <line class="outline" x1="80" y1="-12" x2="80" y2="0" />

        <line class="outline" x1="30" y1="80" x2="30" y2="92" />
        <line class="outline" x1="55" y1="80" x2="55" y2="92" />
        <line class="outline" x1="80" y1="80" x2="80" y2="92" />

        <!-- Left and Right Pins -->
        <line class="outline" x1="-12" y1="25" x2="0" y2="25" />
        <line class="outline" x1="-12" y1="40" x2="0" y2="40" />
        <line class="outline" x1="-12" y1="55" x2="0" y2="55" />

        <line class="outline" x1="110" y1="25" x2="122" y2="25" />
        <line class="outline" x1="110" y1="40" x2="122" y2="40" />
        <line class="outline" x1="110" y1="55" x2="122" y2="55" />

        <!-- Main Body -->
        <rect class="chip-body outline" x="0" y="0" width="110" height="80" rx="20" />
        <!-- Inner Core -->
        <rect class="chip-inner outline" x="25" y="15" width="60" height="50" rx="10" />
      </g>

      <!-- Connection Stems and Nodes at bottom right -->
      <g transform="translate(310, 260)">
        <!-- Left node -->
        <line class="outline" x1="20" y1="130" x2="20" y2="70" />
        <circle class="fill-pink outline" cx="20" cy="70" r="14" />

        <!-- Right node -->
        <line class="outline" x1="70" y1="130" x2="70" y2="30" />
        <circle class="fill-pink outline" cx="70" cy="30" r="14" />
      </g>
    </g>
  </g>
</svg>
